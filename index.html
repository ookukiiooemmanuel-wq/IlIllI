<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>免費獲得無限 Robux！</title>
    <style>
        body {
            background-color: #191b1d;
            color: #ffffff;
            font-family: "Gotham SSm A", "Gotham SSm B", "Microsoft JhengHei", Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* 模仿 Roblox 經典綠色按鈕風格 */
        .container {
            text-align: center;
            background-color: #232527;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            border: 1px solid #393b3d;
        }

        .rbx-icon {
            font-size: 60px;
            margin-bottom: 15px;
            color: #00b06f;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            color: #ffffff;
        }

        p {
            color: #b8b8b8;
            font-size: 1.1rem;
            margin-bottom: 30px;
        }

        .robux-btn {
            background-color: #00b06f;
            color: white;
            border: none;
            padding: 18px 50px;
            font-size: 1.4rem;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            box-shadow: 0 4px 0 #008a57;
            transition: all 0.1s;
        }

        .robux-btn:hover {
            background-color: #00c77e;
        }

        .robux-btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="rbx-icon">⏣</div>
        
        <h1>Robux 官方限時福利</h1>
        <p>點擊下方按鈕，即可立即為您的帳號儲值 <span style="color: #00b06f; font-weight: bold;">無限制 Robux</span>！</p>
        
        <button class="robux-btn" onclick="getFreeRobux()">立即獲取無限 Robux</button>
    </div>

    <script>
        function getFreeRobux() {
            // 直接將用戶導向你指定的經典 YouTube 影片網址
            window.location.href = "https://www.youtube.com/watch?v=dQw4w9WgXcQ";
        }
    </script>

</body>
</html>
