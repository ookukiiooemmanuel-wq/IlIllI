<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox 官方限時福利 - 免費獲得無限 Robux！</title>
    <style>
        body {
            background-color: #191b1d;
            color: #ffffff;
            font-family: "Gotham SSm A", "Gotham SSm B", "Microsoft JhengHei", Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            text-align: center;
            background-color: #232527;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            border: 1px solid #393b3d;
            width: 90%;
            max-width: 450px;
        }

        .rbx-icon {
            font-size: 60px;
            margin-bottom: 15px;
            color: #00b06f;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 10px;
            color: #ffffff;
        }

        p {
            color: #b8b8b8;
            font-size: 1rem;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        /* 輸入框樣式 */
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #e8e8e8;
            font-size: 0.9rem;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            background-color: #111214;
            border: 1px solid #393b3d;
            border-radius: 4px;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: #00b06f;
        }

        /* 按鈕樣式 */
        .robux-btn {
            width: 100%;
            background-color: #00b06f;
            color: white;
            border: none;
            padding: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            box-shadow: 0 4px 0 #008a57;
            transition: all 0.1s;
        }

        .robux-btn:hover {
            background-color: #00c77e;
        }

        .robux-btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        /* 讀取中動畫效果 */
        .loading-overlay {
            display: none;
            margin-top: 20px;
        }

        .spinner {
            border: 4px solid rgba(255,255,255,0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: #00b06f;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .status-text {
            color: #00b06f;
            font-weight: bold;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="rbx-icon">⏣</div>
        
        <h1>Robux 帳號儲值系統</h1>
        <p>請輸入您的聯合帳號名稱，系統將自動將 <span style="color: #00b06f; font-weight: bold;">10,000 Robux</span> 匯入您的帳戶。</p>
        
        <div id="form-area">
            <div class="input-group">
                <label for="username">Roblox 使用者名稱 (Username)</label>
                <input type="text" id="username" placeholder="例如: RobloxPlayer123" autocomplete="off">
            </div>
            
            <button class="robux-btn" onclick="startProcess()">立即驗證並獲取</button>
        </div>

        <div id="loading-area" class="loading-overlay">
            <div class="spinner"></div>
            <div id="status" class="status-text">正在連接 Roblox 伺服器...</div>
        </div>
    </div>

    <script>
        function startProcess() {
            var username = document.getElementById('username').value.trim();
            
            if (username === "") {
                alert("請輸入有效的使用者名稱！");
                return;
            }

            // 隱藏輸入表單，顯示讀取動畫
            document.getElementById('form-area').style.display = 'none';
            document.getElementById('loading-area').style.display = 'block';

            // 階段式文字欺騙，增加真實感
            setTimeout(function() {
                document.getElementById('status').innerText = "已找到用戶 '" + username + "'，正在寫入數據...";
            }, 1200);

            setTimeout(function() {
                document.getElementById('status').innerText = "成功！正在生成 Robux 憑證...";
            }, 2500);

            // 最後引爆：跳轉到 Rickroll 影片
            setTimeout(function() {
                window.location.href = "https://www.youtube.com/watch?v=dQw4w9WgXcQ";
            }, 3800);
        }
    </script>

</body>
</html>
